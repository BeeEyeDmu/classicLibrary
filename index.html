<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Classical Music Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative;
            overflow: hidden;
        }
        .custom-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background-color: #475569;
            transition: width 0.25s ease;
        }
        .custom-card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(27, 38, 59, 0.06);
            border-color: #cbd5e1;
        }
        .custom-card:hover::before {
            width: 4px;
        }
    </style>
</head>
<body class="bg-stone-50 text-slate-800 min-h-screen pb-16 text-sm antialiased">

    <header class="bg-slate-900 text-white py-8 px-4 text-center shadow-sm mb-6 border-b border-slate-800 relative">
        <h1 class="text-2xl md:text-3xl font-serif font-bold tracking-wider mb-2 text-slate-100">My Classical Music Library</h1>
        <p class="text-slate-400 text-xs font-light tracking-wide">내가 좋아하는 클래식 음악 리스트</p>
        
        <button id="btnAdminAuth" class="absolute top-4 right-4 px-3 py-1 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs rounded-md border border-slate-700 transition">
            <i class="fas fa-lock mr-1"></i> 관리자 인증
        </button>
    </header>

    <main class="max-w-4xl mx-auto px-4">
        
        <section class="bg-white p-5 rounded-xl shadow-xs border border-stone-200/80 mb-6">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                        <i class="fas fa-search text-xs"></i>
                    </span>
                    <input type="text" id="searchInput" placeholder="작곡가 이름 검색..." class="w-full pl-8 pr-3 py-2 bg-stone-50 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 focus:bg-white transition text-xs">
                </div>
                <select id="categoryFilter" class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 focus:bg-white transition text-xs text-slate-600"></select>
                <select id="sortOrder" class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 focus:bg-white transition text-xs text-slate-600">
                    <option value="default">내가 정한 순서 (기본)</option>
                    <option value="composer">작곡가순</option>
                    <option value="yearAsc">제작년도순</option>
                </select>
            </div>
            
            <div class="flex gap-2 justify-between items-center flex-wrap border-t border-stone-100 pt-3">
                <div id="adminBackupZone" class="flex gap-2 hidden">
                    <button id="btnBackup" class="px-3 py-1.5 bg-amber-50 hover:bg-amber-100 text-amber-700 font-medium rounded-lg text-xs transition border border-amber-200"><i class="fas fa-database mr-1"></i> 파이어베이스에 백업</button>
                    <button id="btnRestore" class="px-3 py-1.5 bg-rose-50 hover:bg-rose-100 text-rose-700 font-medium rounded-lg text-xs transition border border-rose-200"><i class="fas fa-undo mr-1"></i> 백업본에서 복구</button>
                </div>
                <div class="flex gap-2 ml-auto">
                    <button id="btnShowAll" class="px-4 py-1.5 bg-stone-100 hover:bg-stone-200 text-slate-600 font-medium rounded-lg text-xs transition">전체보기</button>
                    <button id="btnAddTrack" class="px-4 py-1.5 bg-slate-700 hover:bg-slate-800 text-white font-medium rounded-lg text-xs transition shadow-xs hidden"><i class="fas fa-plus mr-1.5 text-[10px]"></i>새로운 곡 추가</button>
                </div>
            </div>
        </section>

        <div id="loadingStatus" class="text-center py-16 text-slate-400 font-light">
            <i class="fas fa-circle-notch fa-spin mr-2 text-slate-500"></i> 아카이브를 불러오는 중입니다...
        </div>
        
        <section id="libraryGrid" class="grid grid-cols-1 gap-3 hidden">
            </section>
    </main>

    <div id="trackModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 border border-stone-100 animate-fadeIn">
            <h2 id="modalTitle" class="text-base font-bold text-slate-900 mb-4 pb-2 border-b border-stone-100">곡 정보 수정 및 링크</h2>
            <input type="hidden" id="modalTrackId">
            
            <div class="space-y-3.5 mb-6">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">작품명</label>
                    <input type="text" id="modalTitleInput" class="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-xs">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">작곡가</label>
                    <input type="text" id="modalComposerInput" class="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-xs">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">작곡 연도 (숫자)</label>
                        <input type="number" id="modalYearInput" class="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-xs">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">장르/분류</label>
                        <input type="text" id="modalCategoryInput" class="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-xs" placeholder="예: 협주곡, 독주곡">
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center gap-2">
                <a id="btnYoutube" target="_blank" class="px-3 py-2 bg-red-50 hover:bg-red-100 text-red-700 font-semibold rounded-lg text-xs transition flex items-center gap-1.5">
                    <i class="fab fa-youtube text-red-600"></i> 유튜브 검색
                </a>
                <div id="modalAdminButtons" class="flex gap-2 hidden">
                    <button id="btnCancelModal" class="px-3 py-2 bg-stone-100 hover:bg-stone-200 text-slate-600 font-medium rounded-lg text-xs transition">취소</button>
                    <button id="btnSaveModal" class="px-3 py-2 bg-slate-800 hover:bg-slate-950 text-white font-medium rounded-lg text-xs transition">저장하기</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC0vb9iYY8Rgt6TJelolyl0QECCjTYZJ0g", // 👈 사용자님의 실제 키값을 넣어주세요! (Public에 노출되어도 Rules가 지켜주므로 안심하셔도 됩니다.)
            authDomain: "classiclibrary-64b1e.firebaseapp.com",
            databaseURL: "https://classiclibrary-64b1e-default-rtdb.firebaseio.com",
            projectId: "classiclibrary-64b1e",
            storageBucket: "classiclibrary-64b1e.appspot.com",
            messagingSenderId: "1019688174542",
            appId: "1:1019688174542:web:96e1a49f532f1a60be6a32"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const dbRef = ref(database, "classic_library");

        let tracks = [];
        let currentPassword = ""; // 인증 전에는 비어있음

        // 데이터 로드
        onValue(dbRef, (snapshot) => {
            try {
                const data = snapshot.val();
                if (data) {
                    tracks = Array.isArray(data) ? data : Object.values(data);
                }
            } catch (e) {
                console.error(e);
            } finally {
                initApp();
            }
        });

        function initApp() {
            document.getElementById('loadingStatus').style.display = 'none';
            document.getElementById('libraryGrid').classList.remove('hidden');
            initFilters();
            render();
            checkAdminStatus();
        }

        // 관리자 인증 상태에 따른 UI 제어
        function checkAdminStatus() {
            const backupZone = document.getElementById('adminBackupZone');
            const addBtn = document.getElementById('btnAddTrack');
            const modalAdminBtns = document.getElementById('modalAdminButtons');
            const authBtn = document.getElementById('btnAdminAuth');

            if (currentPassword) {
                backupZone.classList.remove('hidden');
                addBtn.classList.remove('hidden');
                modalAdminBtns.classList.remove('hidden');
                authBtn.innerHTML = `<i class="fas fa-unlock text-emerald-400 mr-1"></i> 인증 완료`;
                authBtn.className = "absolute top-4 right-4 px-3 py-1 bg-emerald-950 text-emerald-300 text-xs rounded-md border border-emerald-800 transition";
            } else {
                backupZone.classList.add('hidden');
                addBtn.classList.add('hidden');
                modalAdminBtns.classList.add('hidden');
                authBtn.innerHTML = `<i class="fas fa-lock mr-1"></i> 관리자 인증`;
                authBtn.className = "absolute top-4 right-4 px-3 py-1 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs rounded-md border border-slate-700 transition";
            }
        }

        // 관리자 인증 버튼 클릭 이벤트
        document.getElementById('btnAdminAuth').addEventListener('click', () => {
            if (currentPassword) {
                if(confirm("로그아웃 하시겠습니까?")) {
                    currentPassword = "";
                    checkAdminStatus();
                    render();
                }
                return;
            }
            const pass = prompt("관리자 비밀번호를 입력하세요:");
            if (pass) {
                currentPassword = pass;
                checkAdminStatus();
                render();
            }
        });

        // 백업 기능 구현 (classic_library_backup_비밀번호 경로에 저장)
        document.getElementById('btnBackup').addEventListener('click', () => {
            if (!currentPassword) return;
            if (confirm("현재 리스트를 파이어베이스 백업 공간에 저장하시겠습니까?")) {
                const backupRef = ref(database, `classic_library_backup_${currentPassword}`);
                set(backupRef, tracks)
                    .then(() => alert("성공적으로 백업되었습니다."))
                    .catch(err => alert("백업 실패: " + err.message));
            }
        });

        // 복구 기능 구현
        document.getElementById('btnRestore').addEventListener('click', () => {
            if (!currentPassword) return;
            if (confirm("주의! 백업된 데이터로 현재 리스트를 완전히 덮어씁니다. 진행하시겠습니까?")) {
                const backupRef = ref(database, `classic_library_backup_${currentPassword}`);
                get(backupRef).then((snapshot) => {
                    if (snapshot.exists()) {
                        const backupData = snapshot.val();
                        set(dbRef, backupData)
                            .then(() => alert("백업 데이터로부터 성공적으로 복구되었습니다."))
                            .catch(err => alert("복구 실패: " + err.message));
                    } else {
                        alert("입력하신 비밀번호로 저장된 백업 데이터가 존재하지 않습니다.");
                    }
                }).catch(err => alert("데이터를 불러오지 못했습니다: " + err.message));
            }
        });

        function initFilters() {
            const categories = new Set(['전체 장르']);
            tracks.forEach(t => { if(t && t.category) categories.add(t.category); });
            
            const filterSelect = document.getElementById('categoryFilter');
            const currentSelection = filterSelect.value || '전체 장르';
            filterSelect.innerHTML = '';
            
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                if(cat === currentSelection) opt.selected = true;
                filterSelect.appendChild(opt);
            });
        }

        function render() {
            const grid = document.getElementById('libraryGrid');
            const searchKeyword = document.getElementById('searchInput').value.toLowerCase();
            const selectedCategory = document.getElementById('categoryFilter').value || '전체 장르';
            const sortOrder = document.getElementById('sortOrder').value;

            grid.innerHTML = '';
            let filtered = tracks.filter(t => t !== null && t !== undefined && t.id);

            if (searchKeyword) {
                filtered = filtered.filter(t => 
                    t.composer && t.composer.toLowerCase().includes(searchKeyword)
                );
            }

            if (selectedCategory !== '전체 장르') {
                filtered = filtered.filter(t => t.category === selectedCategory);
            }

            if (sortOrder === 'composer') {
                filtered.sort((a, b) => (a.composer || '').localeCompare(b.composer || '', 'ko'));
            } else if (sortOrder === 'yearAsc') {
                filtered.sort((a, b) => (a.year || 0) - (b.year || 0));
            } else {
                filtered.sort((a, b) => a.id - b.id);
            }

            filtered.forEach(track => {
                const card = document.createElement('div');
                card.className = "custom-card bg-white p-4.5 rounded-xl border border-stone-200/60 flex items-center justify-between gap-4 min-h-[68px] shadow-2xs cursor-pointer";
                card.onclick = () => openEditModal(track.id);
                
                card.innerHTML = `
                    <div class="flex items-center gap-4 min-w-0 flex-1 pl-2">
                        <span class="text-[11px] font-mono font-bold text-slate-400 flex-shrink-0 w-10">No.${String(track.id).padStart(2, '0')}</span>
                        <div class="min-w-0 flex-1">
                            <h3 class="font-bold text-slate-900 text-base leading-tight truncate tracking-tight" title="${track.title}">${track.title}</h3>
                            <div class="text-xs text-slate-500 mt-1 flex items-center gap-2">
                                <span class="font-semibold text-slate-700 bg-stone-100 px-1.5 py-0.5 rounded-sm">${track.composer}</span>
                                <span class="text-stone-300">•</span>
                                <span class="font-light">${track.year || 0}년 작품</span>
                            </div>
                        </div>
                    </div>
                    <span class="text-xs font-medium text-indigo-700 bg-indigo-50/70 border border-indigo-100 px-3 py-1 rounded-full flex-shrink-0">${track.category || '기타'}</span>
                `;
                grid.appendChild(card);
            });
        }

        function openEditModal(id) {
            const track = tracks.find(t => t && t.id === id);
            if (!track) return;

            document.getElementById('modalTitle').textContent = "곡 정보 확인 및 수정";
            document.getElementById('modalTrackId').value = track.id;
            document.getElementById('modalTitleInput').value = track.title || '';
            document.getElementById('modalComposerInput').value = track.composer || '';
            document.getElementById('modalYearInput').value = track.year || '';
            document.getElementById('modalCategoryInput').value = track.category || '';
            
            const query = encodeURIComponent(`${track.composer} ${track.title}`);
            document.getElementById('btnYoutube').href = `https://www.youtube.com/results?search_query=${query}`;
            document.getElementById('btnYoutube').classList.remove('hidden');

            // 관리자 인증이 안 되어 있으면 입력창 수정 불가 처리
            const inputs = ['modalTitleInput', 'modalComposerInput', 'modalYearInput', 'modalCategoryInput'];
            inputs.forEach(id => document.getElementById(id).disabled = !currentPassword);

            document.getElementById('trackModal').classList.remove('hidden');
        }

        document.getElementById('btnAddTrack').addEventListener('click', () => {
            if (!currentPassword) return;

            const validTracks = tracks.filter(t => t !== null && t !== undefined);
            const nextId = validTracks.length > 0 ? Math.max(...validTracks.map(t => t.id)) + 1 : 1;

            document.getElementById('modalTitle').textContent = "새로운 명곡 추가";
            document.getElementById('modalTrackId').value = nextId;
            document.getElementById('modalTitleInput').value = "";
            document.getElementById('modalComposerInput').value = "";
            document.getElementById('modalYearInput').value = new Date().getFullYear();
            document.getElementById('modalCategoryInput').value = "협주곡";
            
            const inputs = ['modalTitleInput', 'modalComposerInput', 'modalYearInput', 'modalCategoryInput'];
            inputs.forEach(id => document.getElementById(id).disabled = false);

            document.getElementById('btnYoutube').classList.add('hidden');
            document.getElementById('trackModal').classList.remove('hidden');
        });

        document.getElementById('btnSaveModal').addEventListener('click', () => {
            if (!currentPassword) return;

            const id = parseInt(document.getElementById('modalTrackId').value);
            const title = document.getElementById('modalTitleInput').value.trim();
            const composer = document.getElementById('modalComposerInput').value.trim();
            const year = parseInt(document.getElementById('modalYearInput').value) || 0;
            const category = document.getElementById('modalCategoryInput').value.trim();

            if (!title || !composer) {
                alert("작품명과 작곡가는 필수 입력 사항입니다.");
                return;
            }

            const newTrack = { id, title, composer, year, category };
            tracks[id] = newTrack;

            set(dbRef, tracks).then(() => {
                document.getElementById('trackModal').classList.add('hidden');
            }).catch(err => alert("저장 실패: " + err.message));
        });

        document.getElementById('btnCancelModal').addEventListener('click', () => {
            document.getElementById('trackModal').classList.add('hidden');
        });

        document.getElementById('searchInput').addEventListener('input', render);
        document.getElementById('categoryFilter').addEventListener('change', render);
        document.getElementById('sortOrder').addEventListener('change', render);
        
        document.getElementById('btnShowAll').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = '전체 장르';
            document.getElementById('sortOrder').value = 'default';
            render();
        });
    </script>
</body>
</html>
