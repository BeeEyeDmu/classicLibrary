<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클래식 라이브러리 (Classic Library)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;
        }
        .serif-title {
            font-family: 'Noto Serif KR', serif;
        }
    </style>
</head>
<body class="text-slate-800 antialiased pb-28 text-base">

    <!-- Header -->
    <header class="bg-slate-900 text-white sticky top-0 z-40 shadow-md">
        <div class="max-w-md mx-auto px-5 py-5 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold serif-title tracking-wide text-amber-400">Classic Library</h1>
                <p class="text-sm text-slate-400 font-light mt-1">나만의 영혼을 채우는 명곡 아카이브</p>
            </div>
            <button onclick="openAddModal()" class="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-base px-4 py-2 rounded-full shadow transition flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" /></svg>
                추가
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <main class="max-w-md mx-auto px-5 py-6">
        
        <!-- Search & Filter Bar -->
        <div class="mb-6 bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <div class="relative mb-4">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </span>
                <input type="text" id="searchInput" oninput="filterTracks()" class="w-full bg-slate-50 text-slate-900 placeholder-slate-400 text-base rounded-xl pl-11 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400 border border-transparent transition" placeholder="작곡가, 곡명으로 검색...">
            </div>
            
            <!-- Category Chips -->
            <div class="flex gap-2.5 overflow-x-auto pb-1 scrollbar-none text-sm">
                <button onclick="filterCategory('all')" id="chip-all" class="category-chip px-4 py-2 rounded-full bg-slate-900 text-white font-medium whitespace-nowrap transition">전체</button>
                <button onclick="filterCategory('교향곡')" id="chip-교향곡" class="category-chip px-4 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap transition">교향곡</button>
                <button onclick="filterCategory('협주곡')" id="chip-협주곡" class="category-chip px-4 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap transition">협주곡</button>
                <button onclick="filterCategory('독주곡')" id="chip-독주곡" class="category-chip px-4 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap transition">독주/실내악</button>
                <button onclick="filterCategory('성악/오페라')" id="chip-성악/오페라" class="category-chip px-4 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap transition">성악/오페라</button>
            </div>
        </div>

        <!-- Library Stats -->
        <div class="flex justify-between items-center mb-5 px-1 text-sm text-slate-500">
            <div>보관된 명곡 <span id="trackCount" class="font-bold text-slate-800 text-base">0</span>개</div>
            <div class="flex items-center gap-1 text-amber-600 font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                나만의 엄선 큐레이션
            </div>
        </div>

        <!-- Dynamic List Container -->
        <div id="libraryContainer" class="space-y-5"></div>

    </main>

    <!-- Sticky Video Player Panel -->
    <div id="globalPlayer" class="fixed bottom-0 inset-x-0 bg-slate-900 text-white shadow-2xl border-t border-slate-800 transform translate-y-full transition-transform duration-300 z-50 rounded-t-2xl">
        <div class="max-w-md mx-auto p-5">
            <div class="flex justify-between items-start mb-4">
                <div class="pr-4">
                    <span id="playerComposer" class="text-xs font-bold uppercase tracking-wider text-amber-400 block">작곡가</span>
                    <h3 id="playerTitle" class="text-base font-bold line-clamp-1 text-slate-100 mt-0.5">재생 중인 곡 제목</h3>
                    <p id="playerPerformer" class="text-sm text-slate-400 mt-1 line-clamp-1">연주자 정보</p>
                </div>
                <button onclick="closePlayer()" class="text-slate-400 hover:text-white p-1.5 rounded-full hover:bg-slate-800 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l1.414 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                </button>
            </div>
            <div class="relative aspect-video rounded-xl overflow-hidden bg-black shadow-inner">
                <iframe id="youtubeIframe" class="absolute inset-0 w-full h-full" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <!-- Track Management Modal (Add & Edit combined) -->
    <div id="trackModal" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl border border-slate-100">
            <div class="bg-slate-900 text-white px-5 py-4 flex justify-between items-center">
                <h3 id="modalTitleText" class="font-bold serif-title text-amber-400 text-lg">새로운 클래식 추가</h3>
                <button onclick="closeTrackModal()" class="text-slate-400 hover:text-white transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l1.414 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                </button>
            </div>
            <form id="trackForm" onsubmit="saveTrackForm(event)" class="p-5 space-y-4 text-base">
                <input type="hidden" id="formTrackId">
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">작곡가 <span class="text-rose-500">*</span></label>
                    <input type="text" id="formComposer" required class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 focus:outline-none focus:ring-2 focus:ring-amber-400 bg-slate-50 text-base" placeholder="예: 바흐, 베토벤, 쇼팽">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">곡명 <span class="text-rose-500">*</span></label>
                    <input type="text" id="formTitle" required class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 focus:outline-none focus:ring-2 focus:ring-amber-400 bg-slate-50 text-base" placeholder="예: 무반주 첼로 모음곡 1번">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-1">작곡년도</label>
                        <input type="number" id="formYear" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 focus:outline-none focus:ring-2 focus:ring-amber-400 bg-slate-50 text-base" placeholder="예: 1720">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-1">카테고리</label>
                        <select id="formCategory" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 focus:outline-none focus:ring-2 focus:ring-amber-400 bg-slate-50 text-base">
                            <option value="독주곡">독주곡/실내악</option>
                            <option value="교향곡">교향곡</option>
                            <option value="협주곡">협주곡</option>
                            <option value="성악/오페라">성악/오페라</option>
                        </select>
                    </div>
                </div>
                <div class="border-t border-dashed border-slate-200 my-2 pt-3">
                    <label class="block text-sm font-bold text-slate-700 mb-1">대표 명연주 정보</label>
                    <input type="text" id="formPerformer" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 focus:outline-none focus:ring-2 focus:ring-amber-400 bg-slate-50 text-base mb-2" placeholder="연주자 이름 (예: 조성진, 요요마)">
                    <input type="url" id="formYoutube" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 focus:outline-none focus:ring-2 focus:ring-amber-400 bg-slate-50 text-base" placeholder="유튜브 주소 (https://...)">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeTrackModal()" class="w-1/3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition text-base">취소</button>
                    <button type="submit" class="w-2/3 bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-xl transition shadow-md text-base">저장하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Web Logic Framework -->
    <script>
        const initialTracks = [
            {
                id: 1,
                composer: "Ludwig van Beethoven",
                title: "Piano Sonata No. 14 in C-sharp minor, Op. 27, No. 2 'Moonlight' (월광)",
                year: 1801,
                category: "독주곡",
                performances: [{ performer: "백건우 (Kun-Woo Paik)", youtubeUrl: "https://www.youtube.com/watch?v=S8L69v7Z_3E" }]
            },
            {
                id: 2,
                composer: "Frédéric Chopin",
                title: "Ballade No. 1 in G minor, Op. 23",
                year: 1835,
                category: "독주곡",
                performances: [{ performer: "조성진 (Seong-Jin Cho) - 쇼팽 콩쿠르", youtubeUrl: "https://www.youtube.com/watch?v=614OSs9BSeQ" }]
            },
            {
                id: 3,
                composer: "Johannes Brahms",
                title: "Symphony No. 4 in E minor, Op. 98",
                year: 1885,
                category: "교향곡",
                performances: [{ performer: "Carlos Kleiber / Vienna Phil", youtubeUrl: "https://www.youtube.com/watch?v=W60CH514K9w" }]
            }
        ];

        let tracks = [];
        let currentFilter = 'all';

        function initApp() {
            const stored = localStorage.getItem('classic_library_tracks');
            if (stored) {
                tracks = JSON.parse(stored);
            } else {
                tracks = initialTracks;
                localStorage.setItem('classic_library_tracks', JSON.stringify(tracks));
            }
            renderList();
        }

        function renderList() {
            const container = document.getElementById('libraryContainer');
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = tracks.filter(track => {
                const matchesSearch = track.composer.toLowerCase().includes(searchVal) || 
                                      track.title.toLowerCase().includes(searchVal);
                const matchesCategory = (currentFilter === 'all') || (track.category === currentFilter);
                return matchesSearch && matchesCategory;
            });

            document.getElementById('trackCount').innerText = filtered.length;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-14 text-slate-400 bg-white rounded-2xl border border-dashed border-slate-200 p-6">
                        <p class="text-base">검색 결과가 없습니다.<br>리스트를 새로 보강해 보세요!</p>
                    </div>`;
                return;
            }

            container.innerHTML = filtered.map(track => {
                let performanceButtons = track.performances && track.performances.length > 0 
                    ? track.performances.map((perf, index) => `
                        <button onclick="playVideo('${escapeHtml(track.composer)}', '${escapeHtml(track.title)}', '${escapeHtml(perf.performer)}', '${escapeHtml(perf.youtubeUrl)}')" 
                                class="w-full text-left bg-slate-50 hover:bg-amber-50 border border-slate-100 hover:border-amber-200 rounded-xl px-4 py-3 text-base flex items-center justify-between group transition">
                            <span class="text-slate-800 group-hover:text-amber-950 font-semibold truncate flex items-center gap-2">
                                <span class="w-5 h-5 bg-amber-100 group-hover:bg-amber-200 text-amber-800 rounded-full flex items-center justify-center font-bold text-xs">${index + 1}</span>
                                ${perf.performer}
                            </span>
                            <span class="text-sm text-amber-700 bg-amber-50 font-medium px-2.5 py-1 rounded border border-amber-200 flex items-center gap-1 whitespace-nowrap">
                                ▶ 감상하기
                            </span>
                        </button>
                    `).join('') 
                    : `<p class="text-sm text-slate-400 italic px-1">등록된 연주 영상 링크가 없습니다.</p>`;

                return `
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 hover:shadow-md transition duration-200">
                        <div class="flex justify-between items-start gap-2 mb-3">
                            <div class="flex-1">
                                <span class="inline-block px-2.5 py-0.5 bg-slate-100 text-slate-600 text-xs font-semibold rounded-md mb-1.5">${track.category}</span>
                                <h4 class="text-sm font-bold uppercase tracking-wide text-slate-500">${track.composer}</h4>
                                <h3 class="text-lg font-bold text-slate-900 mt-0.5 leading-snug">${track.title}</h3>
                            </div>
                            <div class="flex flex-col items-end gap-2 shrink-0">
                                ${track.year ? `<span class="text-xs font-mono font-bold text-slate-400 bg-slate-50 border border-slate-100 px-2 py-0.5 rounded-md">${track.year}년</span>` : ''}
                                <div class="flex gap-1.5 mt-1">
                                    <!-- Edit Button -->
                                    <button onclick="openEditModal(${track.id})" class="text-slate-400 hover:text-blue-600 bg-slate-50 hover:bg-blue-50 p-2 rounded-md border border-slate-100 hover:border-blue-200 transition" title="수정">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-2.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                                    </button>
                                    <!-- Delete Button -->
                                    <button onclick="deleteTrack(${track.id})" class="text-slate-400 hover:text-rose-600 bg-slate-50 hover:bg-rose-50 p-2 rounded-md border border-slate-100 hover:border-rose-200 transition" title="삭제">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-3 pt-3 border-t border-slate-100 space-y-2">
                            <p class="text-xs font-bold text-slate-400 px-1">명연주 리스트</p>
                            ${performanceButtons}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterTracks() {
            renderList();
        }

        function filterCategory(cat) {
            currentFilter = cat;
            document.querySelectorAll('.category-chip').forEach(btn => {
                btn.classList.remove('bg-slate-900', 'text-white', 'font-medium');
                btn.classList.add('bg-slate-100', 'text-slate-600');
            });
            const selected = document.getElementById(`chip-${cat}`);
            if(selected) {
                selected.classList.remove('bg-slate-100', 'text-slate-600');
                selected.classList.add('bg-slate-900', 'text-white', 'font-medium');
            }
            renderList();
        }

        function playVideo(composer, title, performer, url) {
            const iframe = document.getElementById('youtubeIframe');
            const panel = document.getElementById('globalPlayer');
            
            let videoId = '';
            if (url.includes('v=')) {
                videoId = url.split('v=')[1].split('&')[0];
            } else if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1].split('?')[0];
            } else if (url.includes('embed/')) {
                videoId = url.split('embed/')[1].split('?')[0];
            }

            if (!videoId) {
                alert('유튜브 링크 변환에 실패했습니다. 올바른 주소 형식인지 확인해 주세요.');
                return;
            }

            document.getElementById('playerComposer').innerText = composer;
            document.getElementById('playerTitle').innerText = title;
            document.getElementById('playerPerformer').innerText = performer;
            
            iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            panel.classList.remove('translate-y-full');
        }

        function closePlayer() {
            document.getElementById('youtubeIframe').src = '';
            document.getElementById('globalPlayer').classList.add('translate-y-full');
        }

        // Modal Controls
        function openAddModal() {
            document.getElementById('modalTitleText').innerText = "새로운 클래식 추가";
            document.getElementById('formTrackId').value = "";
            document.getElementById('trackForm').reset();
            document.getElementById('trackModal').classList.remove('hidden');
            document.getElementById('trackModal').classList.add('flex');
        }

        function openEditModal(id) {
            const track = tracks.find(t => t.id === id);
            if (!track) return;

            document.getElementById('modalTitleText').innerText = "클래식 정보 수정";
            document.getElementById('formTrackId').value = track.id;
            document.getElementById('formComposer').value = track.composer;
            document.getElementById('formTitle').value = track.title;
            document.getElementById('formYear').value = track.year || "";
            document.getElementById('formCategory').value = track.category;
            
            if (track.performances && track.performances.length > 0) {
                document.getElementById('formPerformer').value = track.performances[0].performer || "";
                document.getElementById('formYoutube').value = track.performances[0].youtubeUrl || "";
            } else {
                document.getElementById('formPerformer').value = "";
                document.getElementById('formYoutube').value = "";
            }

            document.getElementById('trackModal').classList.remove('hidden');
            document.getElementById('trackModal').classList.add('flex');
        }

        function closeTrackModal() {
            document.getElementById('trackModal').classList.remove('flex');
            document.getElementById('trackModal').classList.add('hidden');
            document.getElementById('trackForm').reset();
        }

        function saveTrackForm(e) {
            e.preventDefault();
            
            const idVal = document.getElementById('formTrackId').value;
            const composer = document.getElementById('formComposer').value.trim();
            const title = document.getElementById('formTitle').value.trim();
            const year = document.getElementById('formYear').value ? parseInt(document.getElementById('formYear').value) : null;
            const category = document.getElementById('formCategory').value;
            const performer = document.getElementById('formPerformer').value.trim();
            const youtubeUrl = document.getElementById('formYoutube').value.trim();

            const performances = [];
            if (performer && youtubeUrl) {
                performances.push({ performer, youtubeUrl });
            }

            if (idVal) {
                // EDIT MODE
                const targetIndex = tracks.findIndex(t => t.id === parseInt(idVal));
                if (targetIndex !== -1) {
                    tracks[targetIndex] = {
                        ...tracks[targetIndex],
                        composer,
                        title,
                        year,
                        category,
                        performances
                    };
                }
            } else {
                // ADD MODE
                const newTrack = {
                    id: Date.now(),
                    composer,
                    title,
                    year,
                    category,
                    performances
                };
                tracks.unshift(newTrack);
            }

            localStorage.setItem('classic_library_tracks', JSON.stringify(tracks));
            closeTrackModal();
            renderList();
        }

        function deleteTrack(id) {
            if (confirm("이 곡을 라이브러리에서 정말 삭제하시겠습니까?")) {
                tracks = tracks.filter(t => t.id !== id);
                localStorage.setItem('classic_library_tracks', JSON.stringify(tracks));
                renderList();
            }
        }

        function escapeHtml(text) {
            if(!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        window.onload = initApp;
    </script>
</body>
</html>
