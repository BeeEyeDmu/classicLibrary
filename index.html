<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Classical Music Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        /* 🎵 음악 카드 구성용 사용자 정의 CSS 스타일 애니메이션 효과 */
        .custom-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative;
            overflow: hidden;
            background-color: #ffffff !important;
        }
        .custom-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 0;
            background-color: #334155;
            transition: width 0.25s ease;
        }
        .custom-card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            border-color: #cbd5e1;
        }
        .custom-card:hover::before {
            width: 4px;
        }
        /* 가독성을 위해 리스트의 홀수/짝수 행 배경색을 다르게 지정 */
        .custom-card:nth-child(even) { background-color: #f8f9fa !important; }
        .custom-card:nth-child(odd) { background-color: #ffffff !important; }
    </style>
</head>
<body class="bg-[#f1f3f5] text-slate-800 min-h-screen pb-16 text-sm antialiased">

    <header class="bg-slate-900 text-white py-8 px-4 text-center shadow-sm mb-6 border-b border-slate-800 relative flex flex-col items-center justify-center gap-3">
        <div>
            <h1 class="text-2xl md:text-3xl font-serif font-bold tracking-wider mb-2 text-slate-100">My Classical Music Library</h1>
            <p class="text-slate-400 text-xs font-light tracking-wide">내가 좋아하는 클래식 음악 리스트</p>
        </div>
        <button id="btnAdminAuth" class="mt-1 px-3 py-1 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs rounded-md border border-slate-700 transition">
            <i class="fas fa-lock mr-1"></i> 관리자 인증
        </button>
    </header>

    <main class="max-w-4xl mx-auto px-4">
        <section class="bg-white p-6 rounded-2xl shadow-md border border-slate-100 mb-6">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">
                <div class="flex gap-1.5">
                    <div class="relative flex-1">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i class="fas fa-user text-xs"></i>
                        </span>
                        <input type="text" id="searchInput" placeholder="작곡가 이름 입력..." class="w-full pl-8 pr-3 py-2 bg-stone-50 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 focus:bg-white transition text-xs">
                    </div>
                    <button id="btnSearch" class="px-3 py-2 bg-slate-700 hover:bg-slate-800 text-white rounded-lg text-xs transition flex-shrink-0">
                        <i class="fas fa-search"></i> 검색
                    </button>
                </div>
                <select id="categoryFilter" class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 focus:bg-white transition text-xs text-slate-600">
                    <option value="전체 장르">전체 장르</option>
                </select>
                <select id="sortOrder" class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 focus:bg-white transition text-xs text-slate-600">
                    <option value="default">내가 정한 순서 (기본)</option>
                    <option value="composer">작곡가순</option>
                    <option value="yearAsc">작곡년도순</option>
                </select>
            </div>
            
            <div class="flex gap-2 justify-between items-center flex-wrap border-t border-stone-100 pt-3">
                <div id="adminBackupZone" class="flex gap-2 hidden">
                    <button id="btnBackup" class="px-3 py-1.5 bg-amber-50 hover:bg-amber-100 text-amber-700 font-medium rounded-lg text-xs transition border border-amber-200"><i class="fas fa-database mr-1"></i> 파이어베이스에 백업</button>
                    <button id="btnRestore" class="px-3 py-1.5 bg-rose-50 hover:bg-rose-100 text-rose-700 font-medium rounded-lg text-xs transition border border-rose-200"><i class="fas fa-undo mr-1"></i> 백업본에서 복구</button>
                </div>
                <div class="flex gap-2 ml-auto">
                    <button id="btnShowAll" class="px-4 py-1.5 bg-stone-100 hover:bg-stone-200 text-slate-600 font-medium rounded-lg text-xs transition">전체보기</button>
                    <button id="btnAddTrack" class="px-4 py-1.5 bg-slate-700 hover:bg-slate-800 text-white font-medium rounded-lg text-xs transition shadow-xs hidden"><i class="fas fa-plus mr-1.5 text-[10px]"></i>새로운 곡 추가</button>
                </div>
            </div>
        </section>

        <div id="loadingStatus" class="text-center py-16 text-slate-400 font-light">
            <i class="fas fa-circle-notch fa-spin mr-2 text-slate-500"></i> 아카이브를 불러오는 중입니다...
        </div>
        
        <section id="libraryGrid" class="grid grid-cols-1 gap-2 hidden">
            </section>
    </main>

    <div id="passwordModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-xs flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-xl shadow-xl max-w-xs w-full p-5 border border-stone-100">
            <h2 class="text-sm font-bold text-slate-900 mb-3"><i class="fas fa-key text-amber-500 mr-1.5"></i>관리자 인증</h2>
            <p class="text-xs text-slate-500 mb-4 leading-relaxed">데이터를 수정하려면 지정된 비밀번호를 입력해 주세요.</p>
            <div class="mb-4">
                <input type="password" id="securePasswordInput" placeholder="비밀번호 입력..." class="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-sm tracking-widest font-mono">
                <p id="passwordErrorMsg" class="text-rose-600 text-xs mt-1.5 font-bold hidden">❌ 비밀번호가 올바르지 않습니다.</p>
            </div>
            <div class="flex justify-end gap-1.5 text-xs">
                <button id="btnCancelPasswordModal" class="px-3 py-2 bg-stone-100 hover:bg-stone-200 text-slate-600 font-bold rounded-lg transition">취소</button>
                <button id="btnConfirmPasswordModal" class="px-3 py-2 bg-slate-800 hover:bg-slate-950 text-white font-bold rounded-lg transition flex items-center gap-1">
                    <span id="authBtnSpinner" class="hidden"><i class="fas fa-spinner fa-spin"></i></span> 인증하기
                </button>
            </div>
        </div>
    </div>

    <div id="trackModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 border border-stone-100 max-h-[90vh] overflow-y-auto">
            <h2 id="modalTitle" class="text-lg font-bold text-slate-900 mb-4 pb-2 border-b border-stone-100">곡 정보 수정 및 조회</h2>
            <input type="hidden" id="modalTrackId">
            
            <div class="space-y-4 mb-5">
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">작품명</label>
                    <input type="text" id="modalTitleInput" class="w-full px-3 py-2.5 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-sm font-medium">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">작곡가</label>
                    <input type="text" id="modalComposerInput" class="w-full px-3 py-2.5 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-sm font-medium">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-1">작곡 연도 (숫자)</label>
                        <input type="number" id="modalYearInput" class="w-full px-3 py-2.5 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-sm font-medium">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-1">장르/분류</label>
                        <select id="modalCategoryInput" class="w-full px-3 py-2.5 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-sm font-medium bg-white text-slate-700">
                            <option value="클래식 기타">클래식 기타</option>
                            <option value="독주곡">독주곡</option>
                            <option value="중주곡">중주곡</option>
                            <option value="실내악">실내악</option>
                            <option value="협주곡">협주곡</option>
                            <option value="교향곡">교향곡</option>
                            <option value="관현악곡">관현악곡</option>
                            <option value="가곡/성악">가곡/성악</option>
                            <option value="오페라/합창">오페라/합창</option>
                            <option value="기타">기타</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">노트 / 메모</label>
                    <textarea id="modalMemoInput" rows="3" placeholder="곡에 대한 개인적인 감상이나 메모를 남겨보세요..." class="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-sm font-medium bg-stone-50 resize-none"></textarea>
                </div>
            </div>

            <div class="flex justify-between items-center gap-2 mb-4 pt-2 border-t border-stone-100">
                <a id="btnYoutube" target="_blank" class="px-3 py-2 bg-red-50 hover:bg-red-100 text-red-700 font-bold rounded-lg text-xs transition flex items-center gap-1.5">
                    <i class="fab fa-youtube text-red-600"></i> 유튜브 검색
                </a>
                <button id="btnDeleteTrack" class="px-3 py-2 bg-rose-50 hover:bg-rose-100 text-rose-700 font-bold rounded-lg text-xs transition flex items-center gap-1.5 hidden">
                    <i class="fas fa-trash-alt"></i> 이 곡 삭제
                </button>
            </div>

            <div class="flex justify-end gap-2 pt-2 border-t border-stone-100">
                <button id="btnCancelModal" class="px-4 py-2.5 bg-stone-100 hover:bg-stone-200 text-slate-600 font-bold rounded-lg text-sm transition">취소</button>
                <button id="btnSaveModal" class="px-4 py-2.5 bg-slate-800 hover:bg-slate-950 text-white font-bold rounded-lg text-sm transition">저장하기</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // 파이어베이스 프로젝트 고유 설정값
        const firebaseConfig = {
            apiKey: "AIzaSyC0vb9iYY8Rgt6TJelolyl0QECCjTYZJ0g",
            authDomain: "classiclibrary-64b1e.firebaseapp.com",
            databaseURL: "https://classiclibrary-64b1e-default-rtdb.firebaseio.com",
            projectId: "classiclibrary-64b1e",
            storageBucket: "classiclibrary-64b1e.appspot.com",
            messagingSenderId: "1019688174542",
            appId: "1:1019688174542:web:96e1a49f532f1a60be6a32"
        };

        // 데이터베이스 초기화 및 기본 레퍼런스 연결
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const dbRef = ref(database, "classic_library");

        let tracks = [];              // 실시간 라이브러리 데이터를 담는 내부 배열
        let currentPassword = "";     // 현재 세션의 성공한 관리자 비밀번호 평문 보관 변수
        let activeSearchKeyword = ""; // 현재 작동 중인 검색어 키워드 상태값

        // 🔄 [실시간 수신기] 파이어베이스의 음악 목록 실시간 동기화
        onValue(dbRef, (snapshot) => {
            try {
                const data = snapshot.val();
                if (data) {
                    // 데이터가 배열이거나 객체인 경우 유연하게 대응하여 데이터 매핑
                    tracks = Array.isArray(data) ? data : Object.values(data);
                }
            } catch (e) {
                console.error("데이터 로딩 에러:", e);
            } finally {
                initApp(); // 데이터 로딩 완결 시 UI 구동
            }
        });
        
        // 🏁 앱 최초 초기화 및 UI 로딩 처리 함수
        function initApp() {
            document.getElementById('loadingStatus').style.display = 'none';
            document.getElementById('libraryGrid').classList.remove('hidden');
            initFilters();       // 상단 장르 필터 채우기
            render();            // 테이블 화면 그리기
            checkAdminStatus();  // 권한 제어 검사
        }

        // 🛡️ 관리자 권한 여부에 따라 UI 요소들을 동적으로 잠금/해제하는 제어 장치
        function checkAdminStatus() {
            const backupZone = document.getElementById('adminBackupZone');
            const addBtn = document.getElementById('btnAddTrack');
            const saveModalBtn = document.getElementById('btnSaveModal');
            const authBtn = document.getElementById('btnAdminAuth');
            const deleteTrackBtn = document.getElementById('btnDeleteTrack');

            if (currentPassword) {
                // 관리자 인증 성공 상태 UI 활성화
                backupZone.classList.remove('hidden');
                addBtn.classList.remove('hidden');
                saveModalBtn.classList.remove('hidden');
                deleteTrackBtn.classList.remove('hidden');
                authBtn.innerHTML = `<i class="fas fa-unlock text-emerald-400 mr-1"></i> 인증 완료`;
                authBtn.className = "mt-1 px-3 py-1 bg-emerald-950 text-emerald-300 text-xs rounded-md border border-emerald-800 transition";
            } else {
                // 일반 사용자 모드 UI로 제한 잠금
                backupZone.classList.add('hidden');
                addBtn.classList.add('hidden');
                saveModalBtn.classList.add('hidden');
                deleteTrackBtn.classList.add('hidden');
                authBtn.innerHTML = `<i class="fas fa-lock mr-1"></i> 관리자 인증`;
                authBtn.className = "mt-1 px-3 py-1 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs rounded-md border border-slate-700 transition";
            }
        }

        const pswdModal = document.getElementById('passwordModal');
        const pswdInput = document.getElementById('securePasswordInput');
        const pswdError = document.getElementById('passwordErrorMsg');
        const spinner = document.getElementById('authBtnSpinner');

        // 🔒 관리자 인증 버튼 핸들러 (인증 상태이면 로그아웃 유도)
        document.getElementById('btnAdminAuth').addEventListener('click', () => {
            if (currentPassword) {
                if(confirm("로그아웃 하시겠습니까?")) {
                    currentPassword = "";
                    checkAdminStatus();
                    render();
                }
                return;
            }
            pswdInput.value = "";
            pswdError.classList.add('hidden');
            pswdModal.classList.remove('hidden');
            pswdInput.focus();
        });

        document.getElementById('btnCancelPasswordModal').addEventListener('click', () => {
            pswdModal.classList.add('hidden');
        });

        // 🔐 [핵심 암호화 로직] 입력 시점에 평문을 해시화하여 파이어베이스와 실시간 검증
        document.getElementById('btnConfirmPasswordModal').addEventListener('click', () => {
            const enteredPass = pswdInput.value.trim();
            if (!enteredPass) return;

            pswdError.classList.add('hidden');
            spinner.classList.remove('hidden');

            // 1. 입력된 평문 비밀번호(예: 3100)를 그 자리에서 SHA-256 알고리즘을 사용해 64자리 암호문으로 변환합니다.
            const hashedInput = CryptoJS.SHA256(enteredPass).toString();

            //const pwdRef = ref(database, "admin_password");
            const pwdRef = ref(database, "classicLibrary/admin_password");
            get(pwdRef).then((snapshot) => {
                spinner.classList.add('hidden');
                // 2. 파이어베이스에 보관된 암호문 해시값과 변환된 값을 순수 텍스트 비교합니다. (원본 비밀번호 노출 전면 차단)
                if (snapshot.exists() && snapshot.val() === hashedInput) {
                    currentPassword = enteredPass; // 정상 통과 시 세션 권한 매개변수 확보
                    checkAdminStatus();
                    render();
                    pswdModal.classList.add('hidden');
                } else {
                    // 일치하지 않으면 모달을 닫지 않고 경고 라벨 표출 및 재입력 유도
                    pswdError.classList.remove('hidden');
                    pswdInput.select();
                }
            }).catch(err => {
                spinner.classList.add('hidden');
                alert("인증 오류가 발생했습니다: " + err.message);
            });
        });

        pswdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('btnConfirmPasswordModal').click();
            }
        });

        // 🔒 데이터베이스 쓰기 규칙 위배를 방지하기 위한 보안 전송 함수
        function safeSaveToFirebase(dataArray) {
            const payload = JSON.parse(JSON.stringify(dataArray));
            if (Array.isArray(payload)) {
                payload.forEach(item => {
                    if (item) item.admin_password = currentPassword;
                });
            } else if (typeof payload === 'object') {
                payload.admin_password = currentPassword;
            }
            return set(dbRef, payload);
        }

        // 🗄️ 백업 기능 스크립트
        document.getElementById('btnBackup').addEventListener('click', () => {
            if (!currentPassword) return;
            if (confirm("현재 리스트를 파이어베이스 백업 공간에 저장하시겠습니까?")) {
                const backupRef = ref(database, `classic_library_backup_${currentPassword}`);
                const payload = JSON.parse(JSON.stringify(tracks));
                if(Array.isArray(payload)) {
                    payload.forEach(item => { if(item) item.admin_password = currentPassword; });
                }
                set(backupRef, payload)
                    .then(() => alert("성공적으로 백업되었습니다."))
                    .catch(err => alert("백업 실패: " + err.message));
            }
        });

        // ⏪ 복구 기능 스크립트
        document.getElementById('btnRestore').addEventListener('click', () => {
            if (!currentPassword) return;
            if (confirm("주의! 백업된 데이터로 현재 리스트를 완전히 덮어씁니다. 진행하시겠습니까?")) {
                const backupRef = ref(database, `classic_library_backup_${currentPassword}`);
                get(backupRef).then((snapshot) => {
                    if (snapshot.exists()) {
                        const backupData = snapshot.val();
                        safeSaveToFirebase(backupData)
                            .then(() => alert("백업 데이터로부터 성공적으로 복구되었습니다."))
                            .catch(err => alert("복구 실패: " + err.message));
                    } else {
                        alert("저장된 백업 데이터가 존재하지 않습니다.");
                    }
                }).catch(err => alert("데이터를 불러오지 못했습니다: " + err.message));
            }
        });

        // 📂 데이터 기반으로 상단 장르 필터링 셀렉트박스를 채우는 함수
        function initFilters() {
            const categories = new Set(['전체 장르']);
            tracks.forEach(t => { if(t && t.category) categories.add(t.category); });
            const filterSelect = document.getElementById('categoryFilter');
            const currentSelection = filterSelect.value || '전체 장르';
            filterSelect.innerHTML = '';
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat; opt.textContent = cat;
                if(cat === currentSelection) opt.selected = true;
                filterSelect.appendChild(opt);
            });
        }

        // 🖥️ [렌더러 함수] 화면에 카드 형태의 리스트를 그려주는 핵심 메인 뷰 핸들러
        function render() {
            const grid = document.getElementById('libraryGrid');
            const selectedCategory = document.getElementById('categoryFilter').value || '전체 장르';
            const sortOrder = document.getElementById('sortOrder').value;

            grid.innerHTML = '';
            let filtered = tracks.filter(t => t !== null && t !== undefined && t.id);

            // 필터링 규칙 계산
            if (selectedCategory !== '전체 장르') {
                filtered = filtered.filter(t => t.category === selectedCategory);
            } else if (activeSearchKeyword) {
                filtered = filtered.filter(t => t.composer && t.composer.toLowerCase().includes(activeSearchKeyword));
            }

            // 정렬 규칙 연산
            if (sortOrder === 'composer') {
                filtered.sort((a, b) => (a.composer || '').localeCompare(b.composer || '', 'ko'));
            } else if (sortOrder === 'yearAsc') {
                filtered.sort((a, b) => (a.year || 0) - (b.year || 0));
            } else {
                filtered.sort((a, b) => a.id - b.id);
            }

            // 루프 돌며 DOM 카드 엘리먼트 생성 및 추가
            filtered.forEach(track => {
                const card = document.createElement('div');
                card.className = "custom-card p-4 rounded-xl border border-stone-300/70 flex items-center justify-between gap-3 min-h-[84px] shadow-xs cursor-pointer";
                card.onclick = () => openEditModal(track.id);
                card.innerHTML = `
                    <div class="flex items-start gap-1 min-w-0 flex-1">
                        <span class="text-xs font-mono font-bold text-slate-400 flex-shrink-0 w-14 pt-1.5">No.${String(track.id).padStart(2, '0')}</span>
                        <div class="min-w-0 flex-1 flex flex-col items-start gap-1 pl-1">
                            <div class="text-sm flex items-center gap-2 flex-wrap">
                                <span class="font-extrabold text-slate-900">${track.composer}</span>
                                <span class="text-slate-400 font-light text-xs">|</span>
                                <span class="text-slate-500 font-medium">${track.year || 0}년 작품</span>
                            </div>
                            <h3 class="font-bold text-slate-900 text-lg leading-snug tracking-tight text-left truncate w-full" title="${track.title}">${track.title}</h3>
                        </div>
                    </div>
                    <span class="text-xs font-semibold text-indigo-700 bg-indigo-50/90 border border-indigo-100 px-2.5 py-1 rounded-full flex-shrink-0">${track.category || '기타'}</span>
                `;
                grid.appendChild(card);
            });
        }

        // 🔍 검색 버튼 클릭 및 엔터 키 입력 리스너
        document.getElementById('btnSearch').addEventListener('click', () => {
            document.getElementById('categoryFilter').value = '전체 장르';
            activeSearchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
            render();
        });
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('categoryFilter').value = '전체 장르';
                activeSearchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
                render();
            }
        });
        document.getElementById('categoryFilter').addEventListener('change', () => {
            if (document.getElementById('categoryFilter').value !== '전체 장르') {
                document.getElementById('searchInput').value = ''; activeSearchKeyword = "";
            }
            render();
        });

        // 🔓 모달 제어: 음악 클릭 시 상세 보기 모달 오픈 함수 (권한 여부에 따라 input박스 자동 비활성화)
        function openEditModal(id) {
            const track = tracks.find(t => t && t.id === id);
            if (!track) return;

            document.getElementById('modalTitle').textContent = "곡 정보 확인";
            document.getElementById('modalTrackId').value = track.id;
            document.getElementById('modalTitleInput').value = track.title || '';
            document.getElementById('modalComposerInput').value = track.composer || '';
            document.getElementById('modalYearInput').value = track.year || '';
            document.getElementById('modalCategoryInput').value = track.category || '독주곡';
            document.getElementById('modalMemoInput').value = track.memo || '';
            
            // 유튜브 자동 링크 쿼리 생성 기믹
            const query = encodeURIComponent(`${track.composer} ${track.title}`);
            document.getElementById('btnYoutube').href = `https://www.youtube.com/results?search_query=${query}`;
            document.getElementById('btnYoutube').classList.remove('hidden');

            // 인증 전이라면 입력 상자들을 전부 읽기 전용(disabled) 상태로 전환하여 보안 유지
            const inputs = ['modalTitleInput', 'modalComposerInput', 'modalYearInput', 'modalCategoryInput', 'modalMemoInput'];
            inputs.forEach(id => document.getElementById(id).disabled = !currentPassword);

            checkAdminStatus();
            document.getElementById('trackModal').classList.remove('hidden');
        }

        // ➕ 신규 곡 등록용 모달 초기화 스크립트
        document.getElementById('btnAddTrack').addEventListener('click', () => {
            if (!currentPassword) return;
            const validTracks = tracks.filter(t => t !== null && t !== undefined && t.id);
            // 빈 공간이나 중복되지 않도록 고유 인덱스 번호 채번
            const nextId = validTracks.length > 0 ? Math.max(...validTracks.map(t => t.id)) + 1 : 1;

            document.getElementById('modalTitle').textContent = "새로운 명곡 추가";
            document.getElementById('modalTrackId').value = nextId;
            document.getElementById('modalTitleInput').value = "";
            document.getElementById('modalComposerInput').value = "";
            document.getElementById('modalYearInput').value = new Date().getFullYear();
            document.getElementById('modalCategoryInput').value = "클래식 기타"; 
            document.getElementById('modalMemoInput').value = "";
            
            const inputs = ['modalTitleInput', 'modalComposerInput', 'modalYearInput', 'modalCategoryInput', 'modalMemoInput'];
            inputs.forEach(id => document.getElementById(id).disabled = false);

            document.getElementById('btnYoutube').classList.add('hidden');
            document.getElementById('btnDeleteTrack').classList.add('hidden');
            document.getElementById('trackModal').classList.remove('hidden');
        });

        // 💾 곡 정보 추가 및 수정사항 파이어베이스 반영 핸들러
        document.getElementById('btnSaveModal').addEventListener('click', () => {
            if (!currentPassword) return;

            const id = parseInt(document.getElementById('modalTrackId').value);
            const title = document.getElementById('modalTitleInput').value.trim();
            const composer = document.getElementById('modalComposerInput').value.trim();
            const year = parseInt(document.getElementById('modalYearInput').value) || 0;
            const category = document.getElementById('modalCategoryInput').value;
            const memo = document.getElementById('modalMemoInput').value.trim();

            if (!title || !composer) {
                alert("작품명과 작곡가는 필수 입력 사항입니다.");
                return;
            }

            tracks[id] = { id, title, composer, year, category, memo };

            safeSaveToFirebase(tracks).then(() => {
                document.getElementById('trackModal').classList.add('hidden');
            }).catch(err => alert("저장 실패: " + err.message));
        });

        // ❌ 곡 삭제 로직 처리
        document.getElementById('btnDeleteTrack').addEventListener('click', () => {
            if (!currentPassword) return;
            const id = parseInt(document.getElementById('modalTrackId').value);
            const title = document.getElementById('modalTitleInput').value;

            if (confirm(`[주의] "${title}" 곡을 정말로 삭제하시겠습니까?`)) {
                tracks[id] = null; // 데이터를 비워 인덱스 정합성 유지
                safeSaveToFirebase(tracks).then(() => {
                    alert("성공적으로 삭제되었습니다.");
                    document.getElementById('trackModal').classList.add('hidden');
                }).catch(err => alert("삭제 실패: " + err.message));
            }
        });

        document.getElementById('btnCancelModal').addEventListener('click', () => {
            document.getElementById('trackModal').classList.add('hidden');
        });

        document.getElementById('sortOrder').addEventListener('change', render);
        
        // 🔄 전체보기 버튼 리셋 기능 구현
        document.getElementById('btnShowAll').addEventListener('click', () => {
            document.getElementById('searchInput').value = ''; activeSearchKeyword = "";
            document.getElementById('categoryFilter').value = '전체 장르';
            document.getElementById('sortOrder').value = 'default';
            render();
        });
    </script>
</body>
</html>
