<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Classical Music Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        /* 🎵 음악 카드 구성용 사용자 정의 CSS 스타일 애니메이션 효과 */
        .custom-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative;
            overflow: hidden;
            background-color: #ffffff !important;
        }
        .custom-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 0;
            background-color: #334155;
            transition: width 0.25s ease;
        }
        .custom-card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            border-color: #cbd5e1;
        }
        .custom-card:hover::before {
            width: 4px;
        }
        /* 가독성을 위해 리스트의 홀수/짝수 행 배경색을 다르게 지정 */
        .custom-card:nth-child(even) { background-color: #f8f9fa !important; }
        .custom-card:nth-child(odd) { background-color: #ffffff !important; }
    </style>
</head>
<body class="bg-[#f1f3f5] text-slate-800 min-h-screen pb-16 text-sm antialiased">

    <header class="bg-slate-900 text-white py-8 px-4 text-center shadow-sm mb-6 border-b border-slate-800 relative flex flex-col items-center justify-center gap-3">
        <div>
            <h1 class="text-2xl md:text-3xl font-serif font-bold tracking-wider mb-2 text-slate-100">My Classical Music Library</h1>
            <p class="text-slate-400 text-xs font-light tracking-wide">내가 좋아하는 클래식 음악 리스트</p>
        </div>
        <button id="btnAdminAuth" class="mt-1 px-3 py-1 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs rounded-md border border-slate-700 transition">
            <i class="fas fa-lock mr-1"></i> 관리자 인증
        </button>
    </header>

    <main class="max-w-4xl mx-auto px-4">
        <section class="bg-white p-6 rounded-2xl shadow-md border border-slate-100 mb-6">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">
                <div class="flex gap-1.5">
                    <div class="relative flex-1">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i class="fas fa-user text-xs"></i>
                        </span>
                        <input type="text" id="searchInput" placeholder="작곡가 이름 입력..." class="w-full pl-8 pr-3 py-2 bg-stone-50 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 focus:bg-white transition text-xs">
                    </div>
                    <button id="btnSearch" class="px-3 py-2 bg-slate-700 hover:bg-slate-800 text-white rounded-lg text-xs transition flex-shrink-0">
                        <i class="fas fa-search"></i> 검색
                    </button>
                </div>
                <select id="categoryFilter" class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 focus:bg-white transition text-xs text-slate-600">
                    <option value="전체 장르">전체 장르</option>
                </select>
                <select id="sortOrder" class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 focus:bg-white transition text-xs text-slate-600">
                    <option value="default">내가 정한 순서 (기본)</option>
                    <option value="composer">작곡가순</option>
                    <option value="yearAsc">작곡년도순</option>
                </select>
            </div>
            
            <div class="flex gap-2 justify-between items-center flex-wrap border-t border-stone-100 pt-3">
                <div id="adminBackupZone" class="flex gap-2 hidden">
                    <button id="btnBackup" class="px-3 py-1.5 bg-amber-50 hover:bg-amber-100 text-amber-700 font-medium rounded-lg text-xs transition border border-amber-200"><i class="fas fa-database mr-1"></i> 파이어베이스에 백업</button>
                    <button id="btnRestore" class="px-3 py-1.5 bg-rose-50 hover:bg-rose-100 text-rose-700 font-medium rounded-lg text-xs transition border border-rose-200"><i class="fas fa-undo mr-1"></i> 백업본에서 복구</button>
                </div>
                <div class="flex gap-2 ml-auto">
                    <button id="btnShowAll" class="px-4 py-1.5 bg-stone-100 hover:bg-stone-200 text-slate-600 font-medium rounded-lg text-xs transition">전체보기</button>
                    <button id="btnAddTrack" class="px-4 py-1.5 bg-slate-700 hover:bg-slate-800 text-white font-medium rounded-lg text-xs transition shadow-xs hidden"><i class="fas fa-plus mr-1.5 text-[10px]"></i>새로운 곡 추가</button>
                </div>
            </div>
        </section>

        <div id="loadingStatus" class="text-center py-16 text-slate-400 font-light">
            <i class="fas fa-circle-notch fa-spin mr-2 text-slate-500"></i> 아카이브를 불러오는 중입니다...
        </div>
        
        <section id="libraryGrid" class="grid grid-cols-1 gap-2 hidden">
        </section>
    </main>

    <div id="passwordModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-xs flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-xl shadow-xl max-w-xs w-full p-5 border border-stone-100">
            <h2 class="text-sm font-bold text-slate-900 mb-3"><i class="fas fa-key text-amber-500 mr-1.5"></i>관리자 인증</h2>
            <p class="text-xs text-slate-500 mb-4 leading-relaxed">데이터를 수정하려면 지정된 비밀번호를 입력해 주세요.</p>
            <div class="mb-4">
                <input type="password" id="securePasswordInput" placeholder="비밀번호 입력..." class="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-sm tracking-widest font-mono">
                <p id="passwordErrorMsg" class="text-rose-600 text-xs mt-1.5 font-bold hidden">❌ 비밀번호가 올바르지 않습니다.</p>
            </div>
            <div class="flex justify-end gap-1.5 text-xs">
                <button id="btnCancelPasswordModal" class="px-3 py-2 bg-stone-100 hover:bg-stone-200 text-slate-600 font-bold rounded-lg transition">취소</button>
                <button id="btnConfirmPasswordModal" class="px-3 py-2 bg-slate-800 hover:bg-slate-950 text-white font-bold rounded-lg transition flex items-center gap-1">
                    <span id="authBtnSpinner" class="hidden"><i class="fas fa-spinner fa-spin"></i></span> 인증하기
                </button>
            </div>
        </div>
    </div>

    <div id="trackModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 border border-stone-100 max-h-[90vh] overflow-y-auto">
            <h2 id="modalTitle" class="text-lg font-bold text-slate-900 mb-4 pb-2 border-b border-stone-100">곡 정보 수정 및 조회</h2>
            <input type="hidden" id="modalTrackId">
            
            <div class="space-y-4 mb-5">
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">작품명</label>
                    <input type="text" id="modalTitleInput" class="w-full px-3 py-2.5 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-sm font-medium">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">작곡가</label>
                    <input type="text" id="modalComposerInput" class="w-full px-3 py-2.5 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-sm font-medium">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-1">작곡 연도 (숫자)</label>
                        <input type="number" id="modalYearInput" class="w-full px-3 py-2.5 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-sm font-medium">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-1">장르/분류</label>
                        <select id="modalCategoryInput" class="w-full px-3 py-2.5 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-sm font-medium bg-white text-slate-700">
                            <option value="클래식 기타">클래식 기타</option>
                            <option value="독주곡">독주곡</option>
                            <option value="중주곡">중주곡</option>
                            <option value="실내악">실내악</option>
                            <option value="협주곡">협주곡</option>
                            <option value="교향곡">교향곡</option>
                            <option value="관현악곡">관현악곡</option>
                            <option value="가곡/성악">가곡/성악</option>
                            <option value="오페라/합창">오페라/합창</option>
                            <option value="기타">기타</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">노트 / 메모</label>
                    <textarea id="modalMemoInput" rows="3" placeholder="곡에 대한 개인적인 감상이나 메모를 남겨보세요..." class="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-sm font-medium bg-stone-50 resize-none"></textarea>
                </div>
            </div>

            <div class="flex justify-between items-center gap-2 mb-4 pt-2 border-t border-stone-100">
                <a id="btnYoutube" target="_blank" class="px-3 py-2 bg-red-50 hover:bg-red-100 text-red-700 font-bold rounded-lg text-xs transition flex items-center gap-1.5">
                    <i class="fab fa-youtube text-red-600"></i> 유튜브 검색
                </a>
                <button id="btnDeleteTrack" class="px-3 py-2 bg-rose-50 hover:bg-rose-100 text-rose-700 font-bold rounded-lg text-xs transition flex items-center gap-1.5 hidden">
                    <i class="fas fa-trash-alt"></i> 이 곡 삭제
                </button>
            </div>

            <div class="flex justify-end gap-2 pt-2 border-t border-stone-100">
                <button id="btnCancelModal" class="px-4 py-2.5 bg-stone-100 hover:bg-stone-200 text-slate-600 font-bold rounded-lg text-sm transition">취소</button>
                <button id="btnSaveModal" class="px-4 py-2.5 bg-slate-800 hover:bg-slate-950 text-white font-bold rounded-lg text-sm transition">저장하기</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // 파이어베이스 프로젝트 고유 설정값 (beeeyedmu 계정 / classicLibrary 프로젝트)
        const firebaseConfig = {
            apiKey: "AIzaSyC0vb9iYY8Rgt6TJelolyl0QECCjTYZJ0g",
            authDomain: "classiclibrary-64b1e.firebaseapp.com",
            databaseURL: "https://classiclibrary-64b1e-default-rtdb.firebaseio.com",
            projectId: "classiclibrary-64b1e",
            storageBucket: "classiclibrary-64b1e.appspot.com",
            messagingSenderId: "1019688174542",
            appId: "1:1019688174542:web:96e1a49f532f1a60be6a32"
        };

        // 데이터베이스 초기화 및 기본 레퍼런스 연결
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const dbRef = ref(database, "classic_library"); // 데이터베이스 최상위 루트 경로

        let tracks = [];              // 실시간 라이
