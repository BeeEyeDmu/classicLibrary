<!DOCTYPE html>

    <style>
        .custom-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative;
            overflow: hidden;
        }
        .custom-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background-color: #475569;
            transition: width 0.25s ease;
        }
        .custom-card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(27, 38, 59, 0.08);
            border-color: #94a3b8;
        }
        .custom-card:hover::before {
            width: 4px;
        }
        
        /* 지브라 패턴 */
        .custom-card:nth-child(even) {
            background-color: #f8fafc;
        }
        .custom-card:nth-child(odd) {
            background-color: #ffffff;
        }
    </style>
</head>

                </div>

                    <option value="전체 장르">전체 장르</option>

                <select id="sortOrder" class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 focus:bg-white transition text-xs text-slate-600">

                    <option value="composer">작곡가순</option>

                <div class="flex gap-2 ml-auto">
                    <button id="btnShowAll" class="px-4 py-1.5 bg-stone-100 hover:bg-stone-200 text-slate-600 font-medium rounded-lg text-xs transition">전체보기</button>

            </div>

            { id: 81, title: "고목 나무", composer: "쿠프랭", year: 1713, category: "독주곡" },
            { id: 82, title: "클레멘타인 주제 변주곡", composer: "근대작곡가", year: 1930, category: "기타" },
            { id: 83, title: "솔로 소나타 G단조", composer: "바흐", year: 1720, category: "독주곡" },
            { id: 84, title: "기악곡 85번", composer: "텔레만", year: 1740, category: "실내악" },
            { id: 85, title: "소나타 K.331 3악장", composer: "모차르트", year: 1783, category: "독주곡" },
            { id: 86, title: "눈물 (Lagrima)", composer: "타레가", year: 1889, category: "독주곡" },
            { id: 87, title: "아델리타 (Adelita)", composer: "타레가", year: 1889, category: "독주곡" },
            { id: 88, title: "기악 소품 89번", composer: "소르", year: 1820, category: "독주곡" },
            { id: 89, title: "기악 소품 90번", composer: "줄리아니", year: 1810, category: "독주곡" },
            { id: 90, title: "비의 전주곡", composer: "쇼팽", year: 1839, category: "독주곡" },
            { id: 91, title: "달빛 (베르가마스크 조곡 중)", composer: "드뷔시", year: 1890, category: "독주곡" },
            { id: 92, title: "아라베스크 1번", composer: "드뷔시", year: 1888, category: "독주곡" },
            { id: 93, title: "짐노페디 1번", composer: "에릭 사티", year: 1888, category: "독주곡" },
            { id: 94, title: "주피터 테마곡", composer: "근대편곡", year: 1950, category: "기타" },
            { id: 95, title: "라 쿠카라차", composer: "멕시코민요", year: 1910, category: "기타" },
            { id: 96, title: "엘 콘도르 파사", composer: "페루민요", year: 1913, category: "기타" },
            { id: 97, title: "그라나다", composer: "라라", year: 1932, category: "가곡" },
            { id: 98, title: "고향의 봄", composer: "홍난파", year: 1926, category: "기타" },
            { id: 99, title: "아리랑 환상곡", composer: "최성환", year: 1976, category: "관현악곡" },
            { id: 100, title: "사계 중 '겨울'", composer: "비발디", year: 1725, category: "협주곡" },
            { id: 101, title: "하프 협주곡 Bb장조", composer: "헨델", year: 1736, category: "협주곡" },
            { id: 102, title: "수상음악 조곡", composer: "헨델", year: 1717, category: "관현악곡" },
            { id: 103, title: "왕궁의 불꽃놀이", composer: "헨델", year: 1749, category: "관현악곡" }
        ];

        let tracks = [];
        let currentPassword = ""; 
        let activeSearchKeyword = ""; 

        onValue(dbRef, (snapshot) => {
            try {
                const data = snapshot.val();
                if (data && (Array.isArray(data) ? data.length > 50 : Object.keys(data).length > 50)) {
                    tracks = Array.isArray(data) ? data : Object.values(data);
                } else {
                    tracks = initialTracks;
                    set(dbRef, initialTracks); 
                }
            } catch (e) {
                console.error("데이터 로딩 중 에러 발생:", e);
                tracks = initialTracks;
            } finally {
                initApp();
            }
        });
        
        function initApp() {
            document.getElementById('loadingStatus').style.display = 'none';
            document.getElementById('libraryGrid').classList.remove('hidden');
            initFilters();
            render();
            checkAdminStatus();
        }

        function checkAdminStatus() {
            const backupZone = document.getElementById('adminBackupZone');
            const addBtn = document.getElementById('btnAddTrack');
            const saveModalBtn = document.getElementById('btnSaveModal');
            const authBtn = document.getElementById('btnAdminAuth');

            if (currentPassword) {
                backupZone.classList.remove('hidden');
                addBtn.classList.remove('hidden');
                saveModalBtn.classList.remove('hidden');
                authBtn.innerHTML = `<i class="fas fa-unlock text-emerald-400 mr-1"></i> 인증 완료`;
                authBtn.className = "mt-1 px-3 py-1 bg-emerald-950 text-emerald-300 text-xs rounded-md border border-emerald-800 transition";
            } else {
                backupZone.classList.add('hidden');
                addBtn.classList.add('hidden');
                saveModalBtn.classList.add('hidden');
                authBtn.innerHTML = `<i class="fas fa-lock mr-1"></i> 관리자 인증`;
                authBtn.className = "mt-1 px-3 py-1 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs rounded-md border border-slate-700 transition";
            }
        }

        document.getElementById('btnAdminAuth').addEventListener('click', () => {
            if (currentPassword) {
                if(confirm("로그아웃 하시겠습니까?")) {
                    currentPassword = "";
                    checkAdminStatus();
                    render();
                }
                return;
            }
            const pass = prompt("관리자 비밀번호를 입력하세요:");
            if (pass) {
                currentPassword = pass;
                checkAdminStatus();
                render();
            }
        });

        document.getElementById('btnBackup').addEventListener('click', () => {
            if (!currentPassword) return;
            if (confirm("현재 리스트를 파이어베이스 백업 공간에 저장하시겠습니까?")) {
                const backupRef = ref(database, `classic_library_backup_${currentPassword}`);
                set(backupRef, tracks)
                    .then(() => alert("성공적으로 백업되었습니다."))
                    .catch(err => alert("백업 실패: " + err.message));
            }
        });

        document.getElementById('btnRestore').addEventListener('click', () => {
            if (!currentPassword) return;
            if (confirm("주의! 백업된 데이터로 현재 리스트를 완전히 덮어씁니다. 진행하시겠습니까?")) {
                const backupRef = ref(database, `classic_library_backup_${currentPassword}`);
                get(backupRef).then((snapshot) => {
                    if (snapshot.exists()) {
                        const backupData = snapshot.val();
                        set(dbRef, backupData)
                            .then(() => alert("백업 데이터로부터 성공적으로 복구되었습니다."))
                            .catch(err => alert("복구 실패: " + err.message));
                    } else {
                        alert("입력하신 비밀번호로 저장된 백업 데이터가 존재하지 않습니다.");
                    }
                }).catch(err => alert("데이터를 불러오지 못했습니다: " + err.message));
            }
        });

        function initFilters() {
            const categories = new Set(['전체 장르']);
            tracks.forEach(t => { if(t && t.category) categories.add(t.category); });
            
            const filterSelect = document.getElementById('categoryFilter');
            const currentSelection = filterSelect.value || '전체 장르';
            filterSelect.innerHTML = '';
            
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                if(cat === currentSelection) opt.selected = true;
                filterSelect.appendChild(opt);
            });
        }

        // 2. 카드 내부 레이아웃을 수정하여 작곡가 태그와 제목의 왼쪽 시작선을 완벽 일치시킴
        function render() {
            const grid = document.getElementById('libraryGrid');
            const selectedCategory = document.getElementById('categoryFilter').value || '전체 장르';
            const sortOrder = document.getElementById('sortOrder').value;

            grid.innerHTML = '';
            let filtered = tracks.filter(t => t !== null && t !== undefined && t.id);

            if (selectedCategory !== '전체 장르') {
                filtered = filtered.filter(t => t.category === selectedCategory);
            } else if (activeSearchKeyword) {
                filtered = filtered.filter(t => 
                    t.composer && t.composer.toLowerCase().includes(activeSearchKeyword)
                );
            }

            if (sortOrder === 'composer') {
                filtered.sort((a, b) => (a.composer || '').localeCompare(b.composer || '', 'ko'));
            } else if (sortOrder === 'yearAsc') {
                filtered.sort((a, b) => (a.year || 0) - (b.year || 0));
            } else {
                filtered.sort((a, b) => a.id - b.id);
            }

            filtered.forEach(track => {
                const card = document.createElement('div');
                card.className = "custom-card p-4 rounded-xl border border-stone-200/60 flex items-center justify-between gap-3 min-h-[72px] shadow-2xs cursor-pointer";
                card.onclick = () => openEditModal(track.id);
                
                card.innerHTML = `
                    <div class="flex items-start gap-3 min-w-0 flex-1 pl-1">
                        <span class="text-[11px] font-mono font-bold text-slate-400 flex-shrink-0 w-10 pt-1">No. ${String(track.id).padStart(2, '0')}</span>
                        <div class="min-w-0 flex-1 flex flex-col items-start gap-1">
                            <div class="text-xs flex items-center gap-1.5 flex-wrap">
                                <span class="font-bold text-slate-800 bg-stone-100 px-1.5 py-0.5 rounded-md border border-stone-200/40">${track.composer}</span>
                                <span class="text-slate-500 font-medium text-[11px]">${track.year || 0}년 작품</span>
                            </div>
                            <h3 class="font-bold text-slate-900 text-base leading-tight tracking-tight text-left truncate w-full" title="${track.title}">${track.title}</h3>
                        </div>
                    </div>
                    <span class="text-xs font-semibold text-indigo-700 bg-indigo-50/80 border border-indigo-100 px-2.5 py-1 rounded-full flex-shrink-0">${track.category || '기타'}</span>
                `;
                grid.appendChild(card);
            });
        }

        function handleSearch() {
            document.getElementById('categoryFilter').value = '전체 장르';
            activeSearchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
            render();
        }

        document.getElementById('btnSearch').addEventListener('click', handleSearch);
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { handleSearch(); }
        });

        document.getElementById('categoryFilter').addEventListener('change', () => {
            const currentCat = document.getElementById('categoryFilter').value;
            if (currentCat !== '전체 장르') {
                document.getElementById('searchInput').value = '';
                activeSearchKeyword = "";
            }
            render();
        });

        function openEditModal(id) {
            const track = tracks.find(t => t && t.id === id);
            if (!track) return;

            document.getElementById('modalTitle').textContent = "곡 정보 확인";
            document.getElementById('modalTrackId').value = track.id;
            document.getElementById('modalTitleInput').value = track.title || '';
            document.getElementById('modalComposerInput').value = track.composer || '';
            document.getElementById('modalYearInput').value = track.year || '';
            document.getElementById('modalCategoryInput').value = track.category || '';
            
            const query = encodeURIComponent(`${track.composer} ${track.title}`);
            document.getElementById('btnYoutube').href = `https://www.youtube.com/results?search_query=${query}`;
            document.getElementById('btnYoutube').classList.remove('hidden');

            const inputs = ['modalTitleInput', 'modalComposerInput', 'modalYearInput', 'modalCategoryInput'];
            inputs.forEach(id => document.getElementById(id).disabled = !currentPassword);

            document.getElementById('trackModal').classList.remove('hidden');
        }

        document.getElementById('btnAddTrack').addEventListener('click', () => {
            if (!currentPassword) return;

            const validTracks = tracks.filter(t => t !== null && t !== undefined);
            const nextId = validTracks.length > 0 ? Math.max(...validTracks.map(t => t.id)) + 1 : 1;

            document.getElementById('modalTitle').textContent = "새로운 명곡 추가";
            document.getElementById('modalTrackId').value = nextId;
            document.getElementById('modalTitleInput').value = "";
            document.getElementById('modalComposerInput').value = "";
            document.getElementById('modalYearInput').value = new Date().getFullYear();
            document.getElementById('modalCategoryInput').value = "협주곡";
            
            const inputs = ['modalTitleInput', 'modalComposerInput', 'modalYearInput', 'modalCategoryInput'];
            inputs.forEach(id => document.getElementById(id).disabled = false);

            document.getElementById('btnYoutube').classList.add('hidden');
            document.getElementById('trackModal').classList.remove('hidden');
        });

        document.getElementById('btnSaveModal').addEventListener('click', () => {
            if (!currentPassword) return;

            const id = parseInt(document.getElementById('modalTrackId').value);
            const title = document.getElementById('modalTitleInput').value.trim();
            const composer = document.getElementById('modalComposerInput').value.trim();
            const year = parseInt(document.getElementById('modalYearInput').value) || 0;
            const category = document.getElementById('modalCategoryInput').value.trim();

            if (!title || !composer) {
                alert("작품명과 작곡가는 필수 입력 사항입니다.");
                return;
            }

            const newTrack = { id, title, composer, year, category };
            tracks[id] = newTrack;

            set(dbRef, tracks).then(() => {
                document.getElementById('trackModal').classList.add('hidden');
            }).catch(err => alert("저장 실패: " + err.message));
        });

        document.getElementById('btnCancelModal').addEventListener('click', () => {
            document.getElementById('trackModal').classList.add('hidden');
        });

        document.getElementById('sortOrder').addEventListener('change', render);
        
        document.getElementById('btnShowAll').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            activeSearchKeyword = "";
            document.getElementById('categoryFilter').value = '전체 장르';
            document.getElementById('sortOrder').value = 'default';
            render();
        });
    </script>
</body>
</html>
